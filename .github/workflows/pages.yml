name: deploy-fit-explorer

# Publish the deploy/ fit explorer to GitHub Pages as ONE site with TWO views (Pages gives one URL per
# repo, so both live versions live under it):
#   /            = main  (stable, reviewed)
#   /preview/    = dev   (always-latest working branch)
# The workflow assembles both branches' deploy/ into one artifact, so a push to EITHER branch rebuilds the
# whole site from the current state of both. The data is license-clean (our measured footprints + cited
# PUBLIC datasheets, no MVTec), so it is safe to host publicly. Static only — the GPU-measured
# models_params.json is committed; CI does not regenerate it (drift is caught by test_fit_insync.py).
#
# ONE-TIME: enable Pages at Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
# The default GITHUB_TOKEN cannot create the Pages site itself (admin-only); after that this runs untouched.

on:
  push:
    branches: [main, dev]
    paths: ['deploy/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch both branches
        run: git fetch origin main dev --depth=1
      - name: Assemble site — main at root, dev at /preview
        run: |
          mkdir -p _site/preview
          git archive origin/main:deploy | tar -x -C _site
          git archive origin/dev:deploy  | tar -x -C _site/preview
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
