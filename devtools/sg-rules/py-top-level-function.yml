# House rule (owner): everything meaningful is an object — a top-level function should be a method of the
# class that owns its state/responsibility (a named, injectable seam), not a free function; a pure
# stateless helper becomes a @staticmethod on that class. `main`/`_main` (the CLI entrypoint) is exempt.
# GRADUATED TO BLOCKING (severity: error, qc5/bvd): the whole codebase was migrated (129 free funcs -> 0),
# so CI now fails on any NEW top-level function. Mirrors systole's cardiac-seg-y2fi (328 -> 0 -> error).
# Two branches: a bare `function_definition`, AND a `decorated_definition` wrapping one (so a
# @contextmanager / @torch.no_grad() top-level func can't slip past the gate). Class methods don't match:
# their decorated_definition sits inside the class `block`, not directly inside `module`.
id: py-top-level-function
language: python
severity: error
message: "top-level function — make it a method on the class that owns it (house rule; `main` exempt)"
rule:
  any:
    - kind: function_definition
      inside:
        kind: module
        stopBy: neighbor
      not:
        has:
          field: name
          regex: "^_?main$"
    - kind: decorated_definition
      inside:
        kind: module
        stopBy: neighbor
      has:
        kind: function_definition
        not:
          has:
            field: name
            regex: "^_?main$"
