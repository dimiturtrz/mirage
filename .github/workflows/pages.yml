name: deploy-fit-explorer

# Publish the deploy/ fit explorer to GitHub Pages as ONE site with TWO views (Pages gives one URL per
# repo, so both live versions live under it):
#   /            = main  (stable, reviewed)
#   /preview/    = dev   (always-latest working branch)
# Deploys from `main` — the github-pages ENVIRONMENT is branch-protected to the default branch, so a
# non-main deploy is rejected ("Branch not allowed to deploy to github-pages"). The workflow still bundles
# BOTH branches so /preview/ tracks dev: it reads dev's deploy/ via `git archive origin/dev:deploy`, so each
# main build refreshes the dev preview too. (To make /preview/ update on every dev PUSH instead of on main
# builds, add `dev` under Settings -> Environments -> github-pages -> deployment branches.) The data is
# license-clean (measured footprints + cited PUBLIC datasheets, no MVTec), so it is safe to host publicly.
# Static only — models_params.json is committed; CI does not regenerate it (drift caught by test_fit_insync).

on:
  push:
    branches: [main]
    paths: ['deploy/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch both branches
        run: git fetch origin main dev --depth=1
      - name: Assemble site — main at root, dev at /preview
        run: |
          mkdir -p _site/preview
          git archive origin/main:deploy | tar -x -C _site
          git archive origin/dev:deploy  | tar -x -C _site/preview
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
