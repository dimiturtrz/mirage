# Commit-event binding of the same gates CI enforces. No-git MVP: LOCAL hooks (repo: local +
# language: system) that shell out to uvx / uv run with the SPEC-pinned versions — no remote repo+rev
# (that path is the root .pre-commit-hooks.yaml, unused until this goes remote+versioned).
repos:
  - repo: local
    hooks:
      - id: ruff-gate
        name: ruff — enforced (full select)
        entry: uvx ruff@0.15.13 check core surfscan --select F,B,E501,I,T201,FBT,BLE001,S110,C901,PLR0912,PLR0913,PLR0915,PLR2004,PLC0415,RUF100,SIM
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format-gate
        name: ruff — format check (advisory)
        entry: uvx ruff@0.15.13 format --check .
        language: system
        pass_filenames: false
        always_run: true
        verbose: true

      - id: vulture-gate
        name: vulture — dead code (conf>=80)
        entry: uvx vulture@2.16 --min-confidence 80
        language: system
        pass_filenames: false
        always_run: true
      
      - id: importlinter-gate
        name: import-linter — directional layers
        entry: uvx --from import-linter lint-imports
        language: system
        pass_filenames: false
        always_run: true
      
      - id: arch-fitness
        name: architecture fitness (graph.py --assert)
        entry: uv run --extra devtools python -m devtools.graph --assert core surfscan
        language: system
        pass_filenames: false
        always_run: true

      - id: astgrep-gate
        name: ast-grep — module shape
        entry: uvx --from ast-grep-cli ast-grep scan -c devtools/sgconfig.yml core surfscan
        language: system
        pass_filenames: false
        always_run: true

      # Class-shape smells — advisory explorers (LCOM4 cohesion / Fowler data-clumps / namespace-state).
      # They only print a ranked report and always exit 0, so as commit hooks they surface findings
      # without ever blocking — advisory by construction, not by continue-on-error.
      - id: state-candidates
        name: class-shape — namespace-state (advisory)
        entry: uv run python -m devtools.state_candidates core surfscan
        language: system
        pass_filenames: false
        always_run: true
      - id: lcom
        name: class-shape — LCOM4 cohesion (advisory)
        entry: uv run python -m devtools.lcom core surfscan
        language: system
        pass_filenames: false
        always_run: true
      - id: data-clumps
        name: class-shape — data clumps (advisory)
        entry: uv run python -m devtools.data_clumps core surfscan
        language: system
        pass_filenames: false
        always_run: true
      - id: magic-literals
        name: magic-literals — recurring string vocab + dict schemas (advisory)
        entry: uv run python -m devtools.magic_literals core surfscan
        language: system
        pass_filenames: false
        always_run: true
      
