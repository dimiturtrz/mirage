name: ci

# Gate for the dev -> main flow: `tests` + `lint` must pass on every PR (and on pushes to dev/main).
# Enforced as required status checks via branch protection on main (merge blocked until green).
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # ENFORCED (blocks the merge): the FULL curated select is now at zero on core+surfscan — the
      # ratchet is complete. This runs the whole pyproject [tool.ruff.lint].select as the merge gate.
      - name: Lint — enforced (full curated select, at zero)
        run: uvx ruff@0.15.13 check core surfscan
      # ADVISORY (never blocks): full check over the whole tree — surfaces the families still being
      # cleaned so the count is visible in CI. Becomes the enforced gate once it hits zero.
      - name: Lint — advisory full (non-blocking)
        run: uvx ruff@0.15.13 check . --statistics || true
      # ADVISORY: `ruff format` not applied yet — shows the pending reformat, does not block.
      - name: Format — advisory (non-blocking)
        run: uvx ruff@0.15.13 format --check . || true

  tests:
    runs-on: ubuntu-latest
    # no dataset on the runner -> point the data root at an empty POSIX dir so the data-gated tests
    # skip cleanly (adapters glob an absent raw/ -> no subjects -> pytest.skip) instead of erroring on
    # a missing paths.yaml. A plain POSIX path needs no Windows->mount translation.
    env:
      SURFSCAN_DATA: /tmp/surfscan-nodata
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies (locked, + dev extra for pytest)
        run: uv sync --frozen --extra dev
      - name: Unit tests
        run: uv run pytest tests/unit -q
