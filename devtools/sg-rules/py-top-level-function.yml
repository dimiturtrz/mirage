# House rule (owner): everything meaningful is an object — a top-level function should be a method of the
# class that owns its state/responsibility (a named, injectable seam), not a free function; a pure
# stateless helper becomes a @staticmethod on that class. `main`/`_main` (the CLI entrypoint) is exempt.
# ADVISORY (severity: warning) DURING the migration (bag epic qc5) — surfaces the countdown of remaining
# free funcs. GRADUATES to `error` (BLOCKING) once the whole codebase is migrated to 0 (bead bvd), after
# which CI fails on any NEW top-level function. Mirrors systole's cardiac-seg-y2fi (328 -> 0 -> error).
id: py-top-level-function
language: python
severity: warning
message: "top-level function — make it a method on the class that owns it (house rule; `main` exempt)"
rule:
  kind: function_definition
  inside:
    kind: module
    stopBy: neighbor
  not:
    has:
      field: name
      regex: "^_?main$"
