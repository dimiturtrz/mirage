name: deploy-fit-explorer

# Publish the deploy/ fit explorer (deploy/index.html + the committed models_params/accelerators/
# fit_matrix JSON) to GitHub Pages. The data is license-clean — our measured footprints + cited PUBLIC
# vendor datasheets, no MVTec-derived content — so unlike pointcloud-viewer it is safe to host publicly.
# Publishes from `dev` (the working branch) so the live page is always-latest — every deploy/ change
# republishes without waiting on a main merge. Static publish only: the GPU-measured models_params.json is
# committed from a local run; CI does NOT regenerate it (no GPU / no external/M3DM on the runner). Drift is
# caught in the test suite (tests/unit/surfscan/deploy/test_fit_insync.py asserts fit_matrix == a recompute).

on:
  push:
    branches: [dev]
    paths: ['deploy/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # ONE-TIME: enable Pages at Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
      # The default GITHUB_TOKEN cannot create the Pages site itself (admin-only), so this step must be done
      # once in the repo settings; after that every push here deploys with no further manual action.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy
      - id: deployment
        uses: actions/deploy-pages@v4
