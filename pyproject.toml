[project]
name = "surfscan"
version = "0.1.0"
description = "A physics-based synthetic-data engine for 3D perception: generate defect scenes, detect anomalies, measure the sim-to-real gap honestly. Edge-deployable."
readme = "README.md"
requires-python = ">=3.11,<3.13"   # open3d ships cp311/cp312 wheels only (no cp313 yet)
dependencies = [
    "numpy",
    "scipy",
    "scikit-image",
    "tifffile",     # MVTec 3D-AD xyz position maps (3-channel float TIFF)
    "pillow",       # rgb / gt PNGs
    "matplotlib",
    "tqdm",
    "open3d",       # point-cloud processing + the look-at-the-data viewer
    "scikit-learn", # image AUROC (evaluation/metrics.py)
    "polars",       # data store + splits (mirror of systole's cardioseg/data)
    "pydantic>=2",  # validated hyperparameter configs
    "omegaconf",    # paths.yaml config loader (one-root data path)
    "mlflow",       # canonical experiment tracking (params/metrics/artifacts/models; `mlflow ui`)
    # torch >=2.7 required for NVIDIA Blackwell (sm_120, RTX 5090). The CUDA build comes from the
    # PyTorch index (see [tool.uv.sources] below), NOT plain PyPI (which is CPU). Verified: 2.10+cu130.
    "torch>=2.7",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-cov"]
export = ["onnxruntime"]   # ONNX export + parity check (train-vs-deploy skew, carried from acoustic)
features = ["torchvision"] # PatchCore feature memory bank (pretrained backbone) — install cu128 build
# models = [...]           # 3D anomaly method libs (M3DM / mmcv / spconv / pointnet2 CUDA ops) are
#                          # version-fragile and pin torch+cuda tightly — pinned here ONLY once a
#                          # method is chosen, installed into THIS isolated env (never the shared one).
all = ["onnxruntime", "pytest"]

[tool.pytest.ini_options]
testpaths = ["tests"]

# torch + torchvision CUDA builds live on the PyTorch index, not PyPI. Pin them there explicitly so uv
# resolves the cu130 wheels (RTX 5090) instead of CPU. `explicit` = only [tool.uv.sources] packages use it.
[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu130" }
torchvision = { index = "pytorch-cu130" }

[tool.ruff]
line-length = 120
extend-exclude = ["sim"]              # sim/ has its own isaacsim env, not part of the core lint path

[tool.ruff.lint]
select = [
    "F",        # pyflakes — unused imports/vars, undefined names (real bugs)
    "B",        # bugbear — likely bugs (mutable defaults, zip-without-strict, loop-var capture)
    "E501",     # line-too-long only (NOT E701/E702 — the `a; b` compaction stays)
    "I",        # isort — import ordering (autofix)
    "T201",     # print — logging is the rule
    "FBT",      # boolean-trap — bools keyword-only
    "BLE001",   # blind except — broad `except Exception` swallows real bugs
    "S110",     # try-except-pass — silent swallow
    "C901",     # mccabe complexity — the low-ifs / strategy-pattern rule
    "PLR0912",  # too-many-branches
    "PLR0913",  # too-many-arguments — nudges toward config objects
    "PLR0915",  # too-many-statements
    "PLR2004",  # magic-value-comparison — name the constant
    "PLC0415",  # import-outside-top-level — imports at top (circulars: extract, not lazy)
    "RUF100",   # unused-noqa — a noqa that suppresses nothing gets removed
]
# OFF by decision: N* (ML tensor convention — B/H/W/C/N capitals), E701/E702 (compaction kept),
# RUF001-003 (intentional → × ± math unicode; RUF100 ON), D*/ANN* (docstrings/annotations not mandated),
# TRY/EM/SIM/UP (opinionated churn), NPY002 (legacy np.random kept — seed-comparability with existing runs).

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]              # re-exports are the package's public surface
"tests/**" = ["PLR2004", "FBT"]       # literal fixtures + bool test flags are fine in tests

[tool.vulture]
# dead code — the axis ruff can't see. Scan core+surfscan (NOT tests: a prod symbol referenced only by
# a test surfaces as dead here instead of being masked by its test fan-in — the trap that fools both
# vulture and coverage). CI blocks at conf>=80 (near-certain), warns at conf>=60 (dead funcs, has FPs).
paths = ["core", "surfscan"]
exclude = ["sim"]
min_confidence = 60
ignore_names = ["model_config"]
ignore_decorators = ["@model_validator", "@field_validator", "@field_serializer", "@model_serializer", "@computed_field"]

[tool.coverage.run]
# measure LIBRARY logic. omit whole-file dependency boundaries — files with no unit-testable logic left
# in-file because the pure core is extracted out and tested:
#   experiments/ = GPU+data CLI runners ; visualization/ = render/IO
#   patchcore, feat_recon = import torchvision (backbone download) — greedy_coreset->coreset.py, FeatAE->feat_ae.py
#   evaluate = mlflow model load + GPU inference glue — aggregate (harness) + scoring are the tested cores
#   run/viz = entry shells that import the torchvision method/render registries (absent in CI) — the pure
#             dispatch wiring lives in dispatch.py (tested); report.py stays measured (no torchvision).
# Honesty rule: never omit a module to DODGE pure logic — extract the core and test it (as above), then omit the shell.
source = ["core", "surfscan"]
omit = ["surfscan/experiments/*", "surfscan/visualization/*",
        "surfscan/models/patchcore.py", "surfscan/models/feat_recon.py",
        "surfscan/evaluation/evaluate.py",
        "surfscan/run.py", "surfscan/viz.py"]

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "^\\s*\\.\\.\\.$",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["surfscan*", "core*"]
